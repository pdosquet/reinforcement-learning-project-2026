_meta:
  algo: ppo
  task: waypoints  # PyFlyt/QuadX-Waypoints-v4

PyFlyt/QuadX-Waypoints-v4:
  n_timesteps: !!float 1e6
  policy: MlpPolicy
  learning_rate: 3.0e-4
  n_steps: 4096
  batch_size: 128
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs: "dict(net_arch=dict(pi=[256, 256], vf=[256, 256]))"
  env_kwargs:
    goal_reach_distance: 10.0
    flight_dome_size: 30.0
    max_duration_seconds: 120.0
    num_targets: 1
  env_wrapper:
    - scripts.wrappers.WaypointDistanceShaping:
        shaping_coef: 0.2
    - scripts.wrappers.FlattenWaypointEnv:
        max_waypoints: 1
