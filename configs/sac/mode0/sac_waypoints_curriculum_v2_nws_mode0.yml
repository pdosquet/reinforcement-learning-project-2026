_meta:
  algo: sac
  task: waypoints  # PyFlyt/QuadX-Waypoints-v4

PyFlyt/QuadX-Waypoints-v4:
  n_timesteps: !!float 1e6
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 100000
  learning_starts: 5000
  batch_size: 256
  tau: 0.005
  gamma: 0.995
  train_freq: 1
  gradient_steps: 3  # UTD = 3 (best-performing in prior SAC mode 0 runs)
  ent_coef: auto
  target_update_interval: 1
  policy_kwargs: "dict(net_arch=[256, 256])"
  env_kwargs:
    goal_reach_distance: 10.0
    flight_dome_size: 30.0
    max_duration_seconds: 120.0
    num_targets: 1
  env_wrapper:
    - scripts.wrappers.WaypointDistanceShaping:
        shaping_coef: 0.2
    - scripts.wrappers.FlattenWaypointEnv:
        max_waypoints: 4
