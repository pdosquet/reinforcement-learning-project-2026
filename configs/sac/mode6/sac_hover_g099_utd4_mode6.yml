_meta:
  algo: sac
  task: hover  # PyFlyt/QuadX-Hover-v4

PyFlyt/QuadX-Hover-v4:
  n_timesteps: !!float 1e5
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 50000
  learning_starts: 5000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 4  # UTD = 4
  ent_coef: auto
  target_update_interval: 1
  policy_kwargs: "dict(net_arch=[256, 256])"
